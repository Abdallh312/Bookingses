<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio & Booking{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e15;
            --text-main: #f8f9fa;
            --text-muted: #a0aab2;
            --accent: #6c5ce7;
            --accent-hover: #5a4bcf;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --font-main: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, #a0aab2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.95rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-block;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* Sections */
        section {
            padding: 100px 0;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-align: center;
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 4rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Messages */
        .messages {
            list-style: none;
            margin-bottom: 2rem;
        }

        .messages li {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .messages .success {
            background-color: rgba(46, 213, 115, 0.1);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.2);
        }

        .messages .error {
            background-color: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.2);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-muted);
            border-top: 1px solid var(--card-border);
            margin-top: 5rem;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="{% url 'home' %}" style="text-decoration: none; color: inherit;">Studio<span style="color: var(--accent);">.</span></a></div>
        <div class="nav-links">
            <a href="{% url 'workers_list' %}">Find Talent</a>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <form method="POST" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-primary" style="margin-left: 2rem;">Log Out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Log In</a>
                <a href="{% url 'register' %}" class="btn-primary" style="margin-left: 2rem;">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main style="padding-top: 100px;">
        {% if messages %}
        <div class="container" style="margin-top: 2rem;">
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}" style="margin-bottom: 1rem; padding: 1rem; border-radius: 8px; {% if message.tags == 'success' %}background: rgba(46, 213, 115, 0.1); color: #2ed573;{% else %}background: rgba(255, 71, 87, 0.1); color: #ff4757;{% endif %}">{{ message }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; {% now "Y" %} Studio. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
